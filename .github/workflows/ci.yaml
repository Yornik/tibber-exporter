name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-test:
    name: Build & vet
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  build:
    name: Build image (validate)
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Reliable release path: pushing a vX.Y.Z tag builds + pushes the amd64 image.
  release-image:
    name: Push release image
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/yornik/tibber-exporter:${{ github.ref_name }}
            ghcr.io/yornik/tibber-exporter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
