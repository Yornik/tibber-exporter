name: release-please

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp

  # Build + push the release image in the same run (release-please tags via
  # GITHUB_TOKEN, which would NOT trigger a separate tag-triggered workflow).
  # amd64-only: the cluster is amd64 and it avoids the flaky QEMU/Docker Hub pulls.
  image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push release image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/yornik/tibber-exporter:${{ needs.release-please.outputs.tag_name }}
            ghcr.io/yornik/tibber-exporter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
